name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Pobieranie kodu
      uses: actions/checkout@v4

    - name: Instalacja środowiska .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Pobieranie paczek NuGet
      run: dotnet restore

    - name: Kompilacja kodu (API i Worker)
      run: dotnet build --no-restore --configuration Release

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Pobieranie kodu
      uses: actions/checkout@v4

    - name: Instalacja środowiska Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Instalacja paczek npm
      working-directory: ./ReportGenerator.UI
      run: npm install

    - name: Budowanie aplikacji React
      working-directory: ./ReportGenerator.UI
      run: npm run build